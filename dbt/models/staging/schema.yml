version: 2

models:
  - name: stg_events
    description: "Staging model with mock event data for testing"
    columns:
      - name: event_id
        description: "Unique event identifier"
        tests:
          - unique
          - not_null
      - name: event_type
        description: "Type of event (page_view, click, purchase, signup, logout)"
        tests:
          - not_null
      - name: user_id
        description: "User identifier"
        tests:
          - not_null
      - name: event_timestamp
        description: "When the event occurred"
        tests:
          - not_null
